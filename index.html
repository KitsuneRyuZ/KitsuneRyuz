<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KitsuneRyuz — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- grain overlay -->
  <div id="grain" aria-hidden="true"></div>

  <!-- petal canvas -->
  <canvas id="petalCanvas" aria-hidden="true"></canvas>

  <!-- ────────────────── NAV ────────────────── -->
  <nav id="nav">
    <a href="#hero" class="logo" id="navLogo">KitsuneRyuz</a>
    <ul class="nav-links">
      <li><a href="#about"    data-s="about">About</a></li>
      <li><a href="#projects" data-s="projects">Work</a></li>
      <li><a href="#contact"  data-s="contact">Contact</a></li>
    </ul>
    <button class="ham" id="ham" aria-label="Toggle menu">
      <span></span><span></span>
    </button>
  </nav>

  <div class="mob-menu" id="mobMenu">
    <a href="#about"    onclick="closeMob()">About</a>
    <a href="#projects" onclick="closeMob()">Work</a>
    <a href="#contact"  onclick="closeMob()">Contact</a>
  </div>

  <!-- ────────────────── HERO ────────────────── -->
  <section id="hero">

    <!-- floating kanji decoration -->
    <div class="hero-kanji-bg" id="heroKanji" aria-hidden="true"></div>

    <div class="hero-left">
      <p class="hero-greeting anim-up" id="heroGreeting"></p>

      <h1 class="anim-up d1" id="heroHeadline">
        <!-- JS fills this -->
      </h1>

      <p class="hero-desc anim-up d2" id="heroDesc"></p>

      <div class="typewriter-line anim-up d2">
        <span id="twText"></span><span class="tw-cursor" id="twCursor">|</span>
      </div>

      <div class="hero-cta anim-up d3" id="heroCta">
        <!-- JS fills this -->
      </div>
    </div>

    <div class="hero-right anim-up d2">
      <div class="hero-card">
        <!-- decorative lines -->
        <div class="card-line top"></div>
        <div class="card-line right"></div>
        <div class="card-line bottom"></div>
        <div class="card-line left"></div>

        <div class="card-inner">
          <span class="hero-big-kanji" id="heroBigKanji"></span>
          <div class="card-label" id="heroKanjiLabel"></div>
        </div>

        <div class="status-pill" id="statusPill">
          <span class="s-dot"></span>
          <span id="statusText"></span>
        </div>
      </div>
    </div>

    <!-- scroll hint -->
    <div class="scroll-hint">
      <div class="scroll-line"></div>
      <span>scroll</span>
    </div>

  </section>

  <!-- ────────────────── MARQUEE ────────────────── -->
  <div class="mq-wrap" aria-hidden="true">
    <div class="mq-track" id="mqTrack"></div>
  </div>

  <!-- ────────────────── ABOUT ────────────────── -->
  <section id="about">
    <div class="section-head reveal">
      <span class="jp-label">について</span>
      <span class="en-label">About</span>
      <h2 id="aboutHeading"></h2>
    </div>

    <div class="about-grid">
      <div class="bio reveal">
        <div id="bioParagraphs"></div>
        <div class="stats-row" id="statsRow"></div>
        <div class="bio-btns">
          <a id="bioGithubBtn" href="#" target="_blank" class="btn outline">GitHub</a>
          <a id="bioHireBtn"   href="#" class="btn outline">Hire Me</a>
        </div>
      </div>

      <div class="skills-col reveal d1">
        <h3>スキル <span class="en-sub">Skills</span></h3>
        <div class="skill-list" id="skillList"></div>
      </div>
    </div>
  </section>

  <!-- ────────────────── PROJECTS ────────────────── -->
  <section id="projects">
    <div class="section-head reveal">
      <span class="jp-label">プロジェクト</span>
      <span class="en-label">Work</span>
      <h2>Selected Projects</h2>
    </div>

    <div class="project-grid" id="projectGrid"></div>
  </section>

  <!-- ────────────────── CONTACT ────────────────── -->
  <section id="contact">
    <div class="section-head reveal">
      <span class="jp-label">連絡</span>
      <span class="en-label">Contact</span>
      <h2 id="contactHeading"></h2>
    </div>

    <div class="contact-grid">
      <div class="contact-info reveal">
        <p id="contactSubtext"></p>
        <div class="contact-details" id="contactDetails"></div>
        <div class="socials" id="socialLinks"></div>
      </div>

      <form class="contact-form reveal d1" id="contactForm" novalidate>
        <div class="form-row">
          <div class="fg">
            <label for="f-name">お名前 <span class="en-sub">Name</span></label>
            <input type="text"  id="f-name"  name="name"  placeholder="Your name" />
            <span class="ferr">Required.</span>
          </div>
          <div class="fg">
            <label for="f-email">メール <span class="en-sub">Email</span></label>
            <input type="email" id="f-email" name="email" placeholder="you@email.com" />
            <span class="ferr">Valid email required.</span>
          </div>
        </div>
        <div class="fg">
          <label for="f-msg">
            メッセージ <span class="en-sub">Message</span>
            <small id="cc">0 / 500</small>
          </label>
          <textarea id="f-msg" name="message" rows="5"
            placeholder="Tell me about your project…"
            maxlength="500"></textarea>
          <span class="ferr">Min 20 characters.</span>
        </div>
        <button type="submit" class="btn btn-submit" id="submitBtn">
          <span class="bt">送信 — Send Message</span>
          <span class="bl" aria-hidden="true">
            <span></span><span></span><span></span>
          </span>
        </button>
      </form>
    </div>
  </section>

  <!-- ────────────────── FOOTER ────────────────── -->
  <footer>
    <p id="footerCopy"></p>
    <span class="footer-kanji" id="footerKanji"></span>
    <p><a id="footerUrl" href="#"></a></p>
  </footer>

  <!-- toast -->
  <div id="toast" role="status" aria-live="polite"></div>

  <!-- Load config FIRST, then script -->
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
